name: ldslockOS Build Factory
on: [push]

jobs:
  generate-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Clone ldslockOS Source
        uses: actions/checkout@v4

      - name: Install Compilers and Tools
        run: |
          sudo apt update
          sudo apt install -y live-build nasm mono-devel build-essential

      - name: Compile OS Components
        run: |
          # Create binaries directory
          mkdir -p src/bin
          
          # 1. Compile Assembly (Boot/Low Level)
          # (Note: Se os arquivos abaixo não existirem exatamente nesses caminhos, a build falhará)
          if [ -f src/boot/header.asm ]; then nasm -f elf64 src/boot/header.asm -o src/bin/header.o; fi
          
          # 2. Compile C++ (Kernel Extensions)
          if [ -f src/kernel_ext/info.cpp ]; then g++ -c src/kernel_ext/info.cpp -o src/bin/info.o; fi
          
          # 3. Compile C# (Security Manager)
          mcs src/tools/Manager.cs -out:src/bin/LockManager.exe

      - name: Build ldslockOS ISO
        run: |
          mkdir build && cd build
          
          # Configure for Debian Testing
          lb config --distribution testing \
                    --architectures amd64 \
                    --bootloader grub-pc \
                    --archive-areas "main contrib non-free non-free-firmware"

          # 1. Languages and Core
          mkdir -p config/package-lists
          echo "locales console-setup" > config/package-lists/languages.list.chroot
          
          # 2. Kernel, Runtime and UI
          echo "linux-image-amd64 mono-runtime i3-wm i3status rofi xorg" > config/package-lists/core.list.chroot
          
          # 3. UI and Installer (Calamares Included)
          echo "gnome-control-center gnome-settings-daemon network-manager-gnome calamares-settings-debian calamares" > config/package-lists/ui.list.chroot

          # 4. Integrate your compiled C# Manager into the OS
          mkdir -p config/includes.chroot/usr/local/bin
          cp ../src/bin/LockManager.exe config/includes.chroot/usr/local/bin/
          
          # Run the build
          sudo lb build

      - name: Release ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ldslockOS-Alpha-Build
          path: build/*.iso
